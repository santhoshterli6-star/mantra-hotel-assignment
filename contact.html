    <meta name="description" content="Book your holiday stay or get in contact with our support desk instantly.">
    <meta name="keywords" content="contact hotel, reservation form, room booking">

</head>

            </ul>

    <main class="content-page">
        <h1>Reservation & Enquiries</h1>
        <p>Please fill out the form below to book a room. Our desk will contact you shortly.</p>
        
        <form class="booking-form">
            <div class="form-group">
                <label for="fullName">Full Name *</label>
                <input type="text" id="fullName" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label for="emailAddress">Email Address *</label>
                <input type="email" id="emailAddress" placeholder="Enter your email address">
            </div>
            <div class="form-group">
                <label for="roomType">Select Room Type</label>
                <select id="roomType">
                    <option value="deluxe">Deluxe Room ($150/night)</option>
                    <option value="ocean">Ocean Suite ($300/night)</option>
                    <option value="penthouse">Presidential Penthouse ($650/night)</option>
                </select>
            </div>
            <button type="submit" class="submit-btn">Submit Booking Request</button>
        </form>
    </main>
